<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lúdica · bem-te-vi — planejamento de sessões</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Nunito+Sans:wght@400;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --paper:#EEF2F2;--paper-deep:#E1E9E9;--card:#FFFFFF;--ink:#243536;--ink-soft:#6E8080;
  --primary:#4DA1A9;--primary-deep:#3C858C;--primary-tint:#E1EFF0;
  --deep:#1C4649;--secondary:#F4A261;--secondary-deep:#D9873F;--secondary-tint:#FCEBDA;
  --gold:#E9C46A;--gold-tint:#F8EDCF;--line:#E1E8E8;--cream:#F3F7F7;
  /* aliases: mantêm classes antigas funcionando com a nova paleta */
  --brown-deep:var(--deep);
  --terra:var(--primary);--terra-deep:var(--primary-deep);--terra-tint:var(--primary-tint);
  --sand-tint:var(--gold-tint);
}
body{font-family:'Nunito Sans',system-ui,sans-serif;color:var(--ink);background:var(--paper);min-height:100vh;line-height:1.5;-webkit-font-smoothing:antialiased}
.display{font-family:'Quicksand',sans-serif;letter-spacing:-.005em}

.shell{display:flex;align-items:stretch;min-height:100vh}
.sidebar{width:240px;flex-shrink:0;background:var(--card);border-right:1px solid var(--line);padding:20px 14px;display:flex;flex-direction:column;gap:2px;position:sticky;top:0;height:100vh;overflow-y:auto;z-index:25}
.sidebar .logo-svg{padding:6px 10px 26px}
.side-nav{display:flex;flex-direction:column;gap:3px}
.side-link{border:0;background:transparent;font-family:inherit;font-size:14px;font-weight:700;color:var(--ink-soft);padding:11px 14px;border-radius:12px;cursor:pointer;display:flex;align-items:center;gap:12px;text-align:left;width:100%;transition:background .15s,color .15s}
.side-link svg{width:18px;height:18px;flex-shrink:0}
.side-link:hover{background:var(--paper);color:var(--primary-deep)}
.side-link.on{background:var(--primary-tint);color:var(--primary-deep)}
.side-foot{margin-top:auto;padding-top:12px;border-top:1px solid var(--line);display:flex;flex-direction:column;gap:2px}
.side-link.danger{color:#C0392B}
.side-link.danger:hover{background:#FBEAE7;color:#C0392B}
.content{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{background:var(--card);position:sticky;top:0;z-index:20;border-bottom:1px solid var(--line);padding:14px 28px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.tb-greet{font-size:15px;color:var(--ink-soft);white-space:nowrap;margin-right:auto}
.tb-greet b{color:var(--ink)}
.mark{width:42px;height:42px;border-radius:13px;background:var(--primary-tint);display:grid;place-items:center;flex-shrink:0}
.title{font-size:22px;font-weight:700;color:var(--primary)}
.sub{font-size:12px;color:var(--ink-soft)}
.icon-btn{border:1px solid var(--line);background:var(--card);border-radius:10px;width:38px;height:38px;display:grid;place-items:center;cursor:pointer;color:var(--ink-soft);flex-shrink:0}
.icon-btn:hover{border-color:var(--primary);color:var(--primary)}
.owner-av{width:38px;height:38px;border-radius:50%;background:var(--primary);color:#fff;display:grid;place-items:center;font-weight:700;font-size:13px;font-family:'Quicksand',sans-serif;flex-shrink:0}
.owner-name{font-size:13px;font-weight:700;color:var(--ink);line-height:1.2}
.owner-sub{font-size:10.5px;color:var(--ink-soft);letter-spacing:.02em}

.main{max-width:1120px;width:100%;margin:0 auto;padding:28px 24px 80px;position:relative}
.canvas{position:relative;z-index:1}
.h2{font-family:'Quicksand',sans-serif;font-size:26px;font-weight:700;color:var(--terra);margin-bottom:4px;letter-spacing:-.01em}
.lead{color:var(--ink-soft);font-size:14px;margin-bottom:22px;max-width:60ch}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:0 1px 3px rgba(28,70,73,.05);transition:box-shadow .18s,border-color .18s}
.item-card:hover,.gcard:hover{box-shadow:0 4px 14px rgba(62,42,30,.07);border-color:#D9C9A8}
.hero{display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:6px}
.hero-title{font-size:28px;font-weight:700;color:var(--ink)}
.hero-sub{color:var(--ink-soft);font-size:14.5px;margin-top:1px}
.hero-stats{display:flex;gap:8px;margin-left:auto;flex-wrap:wrap}
.stat{display:flex;align-items:center;gap:7px;font-size:12.5px;font-weight:700;color:var(--ink-soft);background:var(--card);border:1px solid var(--line);padding:7px 13px;border-radius:999px}
.stat svg{width:15px;height:15px;color:var(--primary)}
.stat b{color:var(--primary-deep);font-size:14px}
.qa-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:20px 0 30px}
.qa{border:0;cursor:pointer;font-family:'Quicksand',sans-serif;font-weight:700;font-size:14px;border-radius:18px;padding:20px 16px;display:flex;flex-direction:column;align-items:center;gap:12px;transition:transform .1s,box-shadow .18s;color:#fff}
.qa-ic{width:44px;height:44px;border-radius:12px;display:grid;place-items:center;background:rgba(255,255,255,.22)}
.qa-ic svg{width:22px;height:22px}
.qa:hover{transform:translateY(-2px);box-shadow:0 10px 22px rgba(36,53,54,.13)}
.qa.teal{background:var(--primary)}
.qa.apricot{background:var(--secondary)}
.qa.plain{background:var(--paper-deep);color:var(--ink);border:1px solid var(--line)}
.qa.plain .qa-ic{background:var(--card);color:var(--primary-deep);box-shadow:0 1px 3px rgba(28,70,73,.08)}
.qa.plain:hover{box-shadow:0 8px 18px rgba(36,53,54,.08)}
@media(max-width:760px){.qa-grid{grid-template-columns:repeat(2,1fr)}}
.set-sec{border:1px solid var(--line);border-radius:14px;padding:14px 16px;display:flex;flex-direction:column;gap:11px}
.set-sec>h5{font-family:'Quicksand',sans-serif;font-weight:700;font-size:14.5px;color:var(--terra-deep);display:flex;align-items:center;gap:8px}
.chip{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;padding:4px 10px;border-radius:999px;background:var(--sand-tint);color:var(--ink)}
.chip.dim{background:#EFE8D6;color:var(--ink-soft)}
.chip.hit{background:var(--terra-tint);color:var(--terra-deep);font-weight:700}
.chip.demanda{background:var(--secondary-tint);color:var(--secondary-deep)}
.btn{font-family:inherit;font-weight:600;font-size:14px;border-radius:11px;cursor:pointer;padding:10px 16px;border:1px solid var(--line);background:var(--card);color:var(--ink);display:inline-flex;align-items:center;gap:8px;transition:transform .06s,background .15s,border-color .15s}
.btn:hover{border-color:var(--terra)}
.btn:active{transform:translateY(1px)}
.btn:disabled{opacity:.55;cursor:default}
.btn.primary{background:var(--terra);color:var(--cream);border-color:var(--terra)}
.btn.primary:hover{background:var(--terra-deep);border-color:var(--terra-deep)}
.btn.accent{background:var(--brown-deep);color:var(--gold);border-color:var(--brown-deep)}
.btn.accent:hover{background:#4a2f1f}
.btn.ghost{background:transparent;border-color:transparent;color:var(--ink-soft);padding:8px 10px}
.btn.ghost:hover{background:var(--sand-tint);color:var(--ink)}
.btn.sm{padding:7px 12px;font-size:13px}
.btn:focus-visible,.nav button:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible,.toggle:focus-visible{outline:2px solid var(--terra);outline-offset:2px}

.plan{display:grid;grid-template-columns:1fr 360px;gap:22px;align-items:start}
.flabel{font-size:12.5px;font-weight:600;color:var(--ink-soft);margin-bottom:7px;display:block}
select,.input,textarea.input{width:100%;font-family:inherit;font-size:14px;color:var(--ink);background:var(--card);border:1px solid var(--line);border-radius:11px;padding:11px 13px}
select:hover,.input:hover{border-color:var(--terra)}
.pat{display:flex;align-items:center;gap:14px;padding:16px 18px}
.avatar{width:46px;height:46px;border-radius:14px;background:var(--primary-tint);color:var(--primary-deep);display:grid;place-items:center;font-weight:700;font-family:'Quicksand',sans-serif;font-size:15px;flex-shrink:0}
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}
.glist{display:flex;flex-direction:column;gap:12px}
.gcard{padding:15px 16px;display:flex;gap:14px;align-items:flex-start}
.rank{font-family:'Quicksand',sans-serif;font-size:14px;font-weight:700;color:var(--cream);background:var(--terra);width:26px;height:26px;border-radius:8px;display:grid;place-items:center;flex-shrink:0;margin-top:2px}
.gname{font-weight:600;font-size:15.5px}
.why{font-size:12.5px;color:var(--ink-soft);margin-top:6px}
.alert-uso{font-size:12px;font-weight:600;color:var(--terra-deep);background:var(--terra-tint);display:inline-flex;align-items:center;gap:6px;padding:4px 9px;border-radius:8px;margin-top:7px}
.panel{position:sticky;top:82px}
.panel-head{padding:15px 16px 12px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:9px;color:var(--terra)}
.panel-head b{color:var(--ink)}
.sess-item{display:flex;align-items:center;gap:8px;padding:11px 14px;border-bottom:1px solid var(--line)}
.sess-item:last-child{border-bottom:0}
.empty{padding:26px 18px;text-align:center;color:var(--ink-soft);font-size:13.5px}
.order{display:flex;flex-direction:column}
.order button{border:0;background:transparent;cursor:pointer;color:var(--ink-soft);padding:0;height:15px;line-height:0}
.order button:hover{color:var(--terra)}
.ai{border:1px dashed var(--terra);background:var(--terra-tint);border-radius:14px;padding:15px 16px;margin-top:16px}
.ai h4{font-size:13.5px;color:var(--terra-deep);display:flex;align-items:center;gap:7px;margin-bottom:6px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.item-card{padding:16px;display:flex;flex-direction:column;gap:10px}
.item-actions{display:flex;gap:4px;margin-left:auto}
.toggles{display:flex;flex-wrap:wrap;gap:8px}
.toggle{font-family:inherit;font-size:12.5px;font-weight:600;cursor:pointer;border-radius:999px;padding:6px 12px;border:1px solid var(--line);background:var(--card);color:var(--ink-soft)}
.toggle.on{background:var(--terra);color:var(--cream);border-color:var(--terra)}
.scrim{position:fixed;inset:0;background:rgba(58,36,23,.5);display:grid;place-items:center;padding:20px;z-index:50}
.modal{background:var(--card);border-radius:18px;width:100%;max-width:560px;max-height:88vh;overflow:auto}
.modal-head{padding:18px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center}
.modal-body{padding:20px;display:flex;flex-direction:column;gap:16px}
.modal-foot{padding:16px 20px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end}
.plano-jogo{padding:12px 14px;border:1px solid var(--line);border-radius:12px}
.muted{color:var(--ink-soft);font-size:13px}
.spin{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes rise{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.rise{animation:rise .25s ease both}
.row{display:flex;gap:12px}
.grow{flex:1}
/* logo nos 3 contextos */
.logo-svg svg{height:32px;width:auto;display:block}
.hero-logo svg{height:44px;width:auto;display:block;margin-bottom:10px}
.auth-logo svg{height:52px;width:auto;display:block;margin:0 auto 18px}
/* evolução */
.evo-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin:16px 0 24px}
.evo-stat{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px 18px}
.evo-stat .num{font-family:'Quicksand',sans-serif;font-size:26px;font-weight:700;color:var(--primary-deep)}
.evo-stat .lbl{font-size:12px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.04em}
.tl{position:relative;padding-left:26px}
.tl::before{content:'';position:absolute;left:8px;top:6px;bottom:6px;width:2px;background:var(--line)}
.tl-item{position:relative;margin-bottom:14px}
.tl-item::before{content:'';position:absolute;left:-24px;top:16px;width:12px;height:12px;border-radius:50%;background:var(--primary);border:3px solid var(--paper)}
.tl-item.planejada::before{background:var(--secondary)}
/* agenda */
.ag-day{margin-bottom:18px}
.ag-day-h{font-family:'Quicksand',sans-serif;font-weight:700;font-size:14px;color:var(--primary-deep);margin-bottom:8px;text-transform:capitalize}
.ag-ev{display:flex;align-items:center;gap:12px;padding:12px 15px;margin-bottom:8px}
.ag-hora{font-family:'Quicksand',sans-serif;font-weight:700;font-size:14px;color:var(--secondary-deep);min-width:88px}
/* relatório (impressão) */
.rep{font-size:13.5px}
.rep-head{display:flex;align-items:center;justify-content:space-between;gap:14px;border-bottom:3px solid var(--primary);padding-bottom:14px;margin-bottom:6px}
.rep-head svg{height:34px;width:auto}
.rep-title{font-family:'Quicksand',sans-serif;font-weight:700;font-size:19px;color:var(--primary-deep);text-align:right}
.rep-meta{display:grid;grid-template-columns:1fr 1fr;gap:6px 20px;padding:12px 0;border-bottom:1px solid var(--line);margin-bottom:14px}
.rep-meta div{font-size:13px}
.rep-meta b{color:var(--primary-deep)}
.rep-sess{border:1px solid var(--line);border-left:4px solid var(--primary);border-radius:12px;padding:13px 15px;margin-bottom:11px;page-break-inside:avoid}
.rep-sess.planejada{border-left-color:var(--secondary)}
.rep-sess h6{font-family:'Quicksand',sans-serif;font-size:13.5px;font-weight:700;color:var(--ink);margin-bottom:6px}
.rep-sec{font-size:11px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.05em;margin:8px 0 4px}
.rep-foot{margin-top:18px;padding-top:10px;border-top:1px solid var(--line);font-size:11px;color:var(--ink-soft);display:flex;justify-content:space-between}
@page{margin:16mm}
.center{min-height:100vh;display:grid;place-items:center;padding:24px}
.auth-card{background:var(--card);border:1px solid var(--line);border-radius:20px;max-width:400px;width:100%;padding:30px;text-align:center}
.auth-card .flabel{text-align:left}
.auth-mark{width:54px;height:54px;border-radius:16px;background:var(--brown-deep);display:grid;place-items:center;margin:0 auto 16px}
.link{background:none;border:0;color:var(--terra-deep);font-family:inherit;font-weight:600;font-size:13px;cursor:pointer;text-decoration:underline;padding:0}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--brown-deep);color:var(--cream);padding:12px 18px;border-radius:12px;font-size:13.5px;font-weight:500;z-index:80;box-shadow:0 6px 20px rgba(0,0,0,.2);max-width:90vw}
.toast.err{background:#8a3b2a}
@media (max-width:900px){.tb-greet{display:none}}
.side-mark{display:none}
@media (max-width:860px){.plan{grid-template-columns:1fr}.panel{position:static}.sidebar{width:72px;padding:20px 10px;align-items:center}.sidebar .lbl{display:none}.sidebar .logo-svg{display:none}.side-mark{display:grid;place-items:center;padding:4px 0 24px}.side-link{justify-content:center;padding:11px;width:auto}}
@media (prefers-reduced-motion:reduce){.rise,.spin{animation:none}}
@media print{
  .sidebar,.topbar{display:none}
  .main{padding:0}
  body:has(.scrim) .main,body:has(.scrim) .topbar{display:none}
  .scrim{position:static;background:none;padding:0;display:block}
  .modal{max-width:none;max-height:none;overflow:visible;border:0;border-radius:0}
  .modal-foot,.modal-head .btn{display:none}
}
</style>
</head>

const jogoFromRow = r => ({id:r.id,nome:r.nome,areas:r.areas||[],min:r.idade_min,max:r.idade_max,obs:r.obs||'',tipo:r.tipo||'jogo'});
const pacFromRow  = r => ({id:r.id,iniciais:r.iniciais,idade:r.idade,demandas:r.demandas||[],obs:r.obs||''});
const sessFromRow = r => ({id:r.id,pid:r.paciente_id,ts:new Date(r.created_at).getTime(),data:r.data,objetivo:r.objetivo||'',nota:r.nota||'',status:r.status,jogos:r.jogos||[],reflexao:r.reflexao||null});
const demFromRow  = r => ({id:r.id,nome:r.nome,areas:r.areas||[]});

/* escreve no Supabase; se faltar coluna nova no banco, remove os campos opcionais e tenta de novo (assim nada quebra antes da migração SQL) */
async function safeWrite(fn, payload, optionalKeys){
  let r = await fn(payload);
  if(r.error){
    const msg=((r.error.message||'')+' '+(r.error.code||'')+' '+(r.error.details||'')).toLowerCase();
    if(/pgrst204|42703|could not find|column/.test(msg)){
      const pl={...payload}, dropped=optionalKeys.filter(k=>k in pl);
      dropped.forEach(k=>delete pl[k]);
      if(dropped.length){
        toast('Coluna(s) "'+dropped.join(', ')+'" ainda não existem no banco — rode o SQL de migração. Salvei sem elas por ora.',true);
        r=await fn(pl);
      }
    }
  }
  return r;
}

/* demandas efetivas = as que já vêm no sistema (DEMANDAS) + as personalizadas que a psicóloga criou (state.demandas) */
function demandasEfetivas(){
  const base=DEMANDAS.slice();
  (state.demandas||[]).forEach(c=>{ if(!base.some(b=>b.nome.toLowerCase()===c.nome.toLowerCase())) base.push({nome:c.nome,areas:c.areas||[]}); });
  return base;
}
function mapaDemandas(){ const m=new Map(); demandasEfetivas().forEach(d=>m.set(d.nome,d.areas||[])); return m; }
function ehDemandaBase(n){ return DEMANDAS.some(x=>x.nome===n); }
function targetAreas(p){const m=mapaDemandas();const s=new Set();(p?.demandas||[]).forEach(d=>{(m.get(d)||[]).forEach(a=>s.add(a))});return[...s]}
function sugestoes(p){
  if(!p)return[];const alvo=targetAreas(p);
  return state.jogos.filter(g=>p.idade>=g.min&&(g.max==null||p.idade<=g.max)).map(g=>{
    const hits=g.areas.filter(a=>alvo.includes(a));return{...g,hits,score:hits.length};
  }).filter(g=>g.score>0).sort((a,b)=>b.score-a.score);
}
function sessoesDoPaciente(pid){return state.sessoes.filter(s=>s.pid===pid).sort((a,b)=>b.ts-a.ts)}
function ultimaSessao(pid){return sessoesDoPaciente(pid)[0]||null}
function usoPorJogo(pid){
  // retorna Map: id_do_jogo -> {count, ultima: 'YYYY-MM-DD', reacoes:[...]}
  const map=new Map();
  sessoesDoPaciente(pid).forEach(s=>s.jogos.filter(j=>j.trabalhado!==false).forEach(j=>{
    const cur=map.get(j.id)||{count:0,ultima:null,reacoes:[]};
    cur.count++; if(!cur.ultima||s.data>cur.ultima)cur.ultima=s.data;
    if(j.reacao&&j.reacao.trim())cur.reacoes.push(j.reacao.trim());
    map.set(j.id,cur);
  }));
  return map;
}
function usoPorNome(pid){
  // igual acima mas indexado por nome (pra casar com sugestões da IA, que só retornam nome)
  const map=new Map();
  usoPorJogo(pid).forEach((info,id)=>{const g=state.jogos.find(x=>x.id===id);if(g)map.set(g.nome,info)});
  return map;
}

/* ============================ SUPABASE / AUTH ============================ */
async function boot(){
  if(isPlaceholder()){render();return}
  if(typeof supabase==="undefined"){state.erro="Não consegui carregar a biblioteca do Supabase (sem internet?).";render();return}
  try{ const {createClient}=supabase; sb=createClient(SUPABASE_URL,SUPABASE_ANON_KEY); }
  catch(e){ state.erro="Falha ao iniciar o Supabase: "+e.message; render(); return; }
  const {data:{session}}=await sb.auth.getSession();
  state.user=session?.user||null;
  if(state.user){ await carregarTudo(); } else { render(); }
}
async function carregarTudo(){
  state.loading=true; render();
  try{
    const [j,p,s]=await Promise.all([
      sb.from('jogos').select('*').order('nome'),
      sb.from('pacientes').select('*').order('iniciais'),
      sb.from('sessoes').select('*').order('created_at',{ascending:false})
    ]);
    if(j.error||p.error||s.error) throw (j.error||p.error||s.error);
    state.jogos=(j.data||[]).map(jogoFromRow);
    state.pacientes=(p.data||[]).map(pacFromRow);
    state.sessoes=(s.data||[]).map(sessFromRow);
    try{ const d=await sb.from('demandas').select('*').order('nome'); if(!d.error) state.demandas=(d.data||[]).map(demFromRow); }catch(e){}
    if(!state.pacientes.find(x=>x.id===state.pid)) state.pid=state.pacientes[0]?.id||"";
    state.loading=false; render();
  }catch(e){ state.loading=false; toast("Erro ao carregar: "+(e.message||e),true); render(); }
}
async function entrar(email,senha){
  state.authBusy=true;render();
  const {error}=await sb.auth.signInWithPassword({email,password:senha});
  state.authBusy=false;
  if(error){toast(error.message,true);render();return}
  const {data:{session}}=await sb.auth.getSession();
  state.user=session?.user||null;
  await carregarTudo();
}
async function criarConta(email,senha,nome){
  state.authBusy=true;render();
  const {data,error}=await sb.auth.signUp({email,password:senha,options:{data:{nome:nome||email.split('@')[0]}}});
  state.authBusy=false;
  if(error){toast(error.message,true);render();return}
  if(data.session){ state.user=data.session.user; await carregarTudo(); }
  else { toast("Conta criada! Confirme pelo e-mail e depois entre.");state.authMode="login";render(); }
}
async function sair(){ await sb.auth.signOut(); state.user=null; state.jogos=[];state.pacientes=[];state.sessoes=[];state.demandas=[];state.sessao=[];state.selDia=new Set(); render(); }

/* ============================ CRUD ============================ */
async function salvarDemandasCustom(list){
  for(const item of list){
    try{
      const existente=state.demandas.find(d=>d.nome.toLowerCase()===item.nome.toLowerCase());
      if(existente){
        if(JSON.stringify((existente.areas||[]).slice().sort())!==JSON.stringify((item.areas||[]).slice().sort())){
          const {data,error}=await sb.from('demandas').update({areas:item.areas}).eq('id',existente.id).select().single();
          if(error)throw error;
          state.demandas=state.demandas.map(d=>d.id===existente.id?demFromRow(data):d);
        }
      }else{
        const {data,error}=await sb.from('demandas').insert({user_id:state.user.id,nome:item.nome,areas:item.areas}).select().single();
        if(error)throw error;
        state.demandas=[...state.demandas,demFromRow(data)];
      }
    }catch(e){
      const m=(e.message||'').toLowerCase();
      if(/demandas|relation|schema cache|does not exist|find the table/.test(m)){
        toast("Pra guardar demandas personalizadas, rode o SQL da tabela 'demandas'.",true);
        break;
      }
    }
  }
}
async function salvarPaciente(f){
  const payload={iniciais:f.iniciais,idade:f.idade,demandas:f.demandas,obs:f.obs};
  if(f.id){
    const {data,error}=await sb.from('pacientes').update(payload).eq('id',f.id).select().single();
    if(error)return toast(error.message,true);
    state.pacientes=state.pacientes.map(x=>x.id===f.id?pacFromRow(data):x);
  }else{
    const {data,error}=await sb.from('pacientes').insert({...payload,user_id:state.user.id}).select().single();
    if(error)return toast(error.message,true);
    state.pacientes=[...state.pacientes,pacFromRow(data)].sort((a,b)=>a.iniciais.localeCompare(b.iniciais));
    if(!state.pid)state.pid=data.id;
  }
  closeModal();render();
}
async function excluirPaciente(id){
  const {error}=await sb.from('pacientes').delete().eq('id',id);
  if(error)return toast(error.message,true);
  state.pacientes=state.pacientes.filter(x=>x.id!==id);
  if(state.pid===id)state.pid=state.pacientes[0]?.id||"";
  render();
}
async function salvarJogo(f){
  const payload={nome:f.nome,areas:f.areas,idade_min:f.min,idade_max:f.max,obs:f.obs,tipo:f.tipo||'jogo'};
  if(f.id){
    const {data,error}=await safeWrite(pl=>sb.from('jogos').update(pl).eq('id',f.id).select().single(),payload,['tipo']);
    if(error)return toast(error.message,true);
    state.jogos=state.jogos.map(x=>x.id===f.id?jogoFromRow(data):x);
  }else{
    const {data,error}=await safeWrite(pl=>sb.from('jogos').insert({...pl,user_id:state.user.id}).select().single(),payload,['tipo']);
    if(error)return toast(error.message,true);
    state.jogos=[...state.jogos,jogoFromRow(data)].sort((a,b)=>a.nome.localeCompare(b.nome));
  }
  closeModal();render();
}
async function excluirJogo(id){
  const {error}=await sb.from('jogos').delete().eq('id',id);
  if(error)return toast(error.message,true);
  state.jogos=state.jogos.filter(x=>x.id!==id);render();
}
async function popularExemplos(){
  const existentes=new Set(state.jogos.map(g=>g.nome));
  const faltantes=SEED_JOGOS.filter(g=>!existentes.has(g.nome));
  if(!faltantes.length){toast("Todos os jogos já estão no banco.");return}
  const rows=faltantes.map(g=>({user_id:state.user.id,nome:g.nome,areas:g.areas,idade_min:g.min,idade_max:g.max,obs:g.obs}));
  let inseridos=0;
  for(let i=0;i<rows.length;i+=25){
    const chunk=rows.slice(i,i+25);
    const {data,error}=await sb.from('jogos').insert(chunk).select();
    if(error){toast("Parou em "+inseridos+" — "+error.message,true);break}
    state.jogos=[...state.jogos,...data.map(jogoFromRow)];
    inseridos+=data.length;render();
  }
  state.jogos.sort((a,b)=>a.nome.localeCompare(b.nome));
  toast(inseridos+" jogo(s) adicionados. Total no banco: "+state.jogos.length);render();
}
async function salvarSessao(){
  const p=state.pacientes.find(x=>x.id===state.pid); if(!p||!state.sessao.length)return;
  const jogos=state.sessao.map(id=>{const g=state.jogos.find(x=>x.id===id);return{id,nome:g?g.nome:'',reacao:''}});
  const {data,error}=await sb.from('sessoes').insert({user_id:state.user.id,paciente_id:p.id,data:state.dataSessao||hoje(),objetivo:state.objetivo,nota:state.nota,status:'planejada',jogos}).select().single();
  if(error)return toast(error.message,true);
  const s=sessFromRow(data);
  state.sessoes=[s,...state.sessoes];
  state.sessao=[];state.objetivo="";state.nota="";state.dataSessao="";
  render(); modalSessao(s.id);
}
async function excluirSessao(id){
  const {error}=await sb.from('sessoes').delete().eq('id',id);
  if(error)return toast(error.message,true);
  state.sessoes=state.sessoes.filter(x=>x.id!==id);closeModal();render();
}

/* ============================ RENDER (raiz) ============================ */
function render(){
  if(isPlaceholder()) return renderSetup();
  if(state.erro) return renderErro();
  if(!state.user) return renderAuth();
  if(state.loading) return renderLoading();
  renderApp();
}
function renderSetup(){
  app().innerHTML=`<div class="center"><div class="auth-card">
    <div class="auth-mark">${MARKC}</div>
    <h1 class="display" style="font-size:24px;color:var(--terra);margin-bottom:6px">Quase lá</h1>
    <p class="muted" style="margin-bottom:14px">Pra ligar na nuvem, abra este arquivo e preencha no topo do código:</p>
    <div class="plano-jogo" style="font-family:monospace;font-size:12.5px;line-height:1.9">SUPABASE_URL = "https://seu-projeto.supabase.co"<br>SUPABASE_ANON_KEY = "sua-chave-anon"</div>
    <p class="muted" style="margin-top:14px">Os valores estão em <b>Supabase → Project Settings → Data API</b>. E rode o arquivo <b>ludica_supabase.sql</b> no SQL Editor uma vez.</p>
  </div></div>`;
}
function renderErro(){
  app().innerHTML=`<div class="center"><div class="auth-card"><div class="auth-mark">${MARKC}</div>
    <h1 class="display" style="font-size:22px;color:var(--terra);margin-bottom:6px">Ops</h1>
    <p class="muted">${esc(state.erro)}</p></div></div>`;
}
function renderLoading(){
  app().innerHTML=`<div class="center"><div style="text-align:center;color:var(--terra)">${I.spin}<p class="muted" style="margin-top:10px">Carregando…</p></div></div>`;
}
function renderAuth(){
  const login=state.authMode==="login";
  app().innerHTML=`<div class="center"><div class="auth-card">
    <div class="auth-logo">${LOGO_SVG}</div>
    <p class="muted" style="margin-bottom:20px">${login?'Entre pra acessar seu espaço.':'Crie sua conta.'}</p>
    <div style="display:flex;flex-direction:column;gap:12px">
      ${login?'':'<div><label class="flabel">Seu nome</label><input class="input" id="a-nome" placeholder="ex: Larissa Lamicoski"></div>'}
      <div><label class="flabel">E-mail</label><input class="input" id="a-mail" type="email" value="${esc(state.authEmail||'')}" placeholder="voce@email.com"></div>
      <div><label class="flabel">Senha</label><input class="input" id="a-pass" type="password" placeholder="mínimo 6 caracteres"></div>
      <button class="btn primary" id="a-go" ${state.authBusy?'disabled':''} style="justify-content:center;margin-top:4px">
        ${state.authBusy?I.spin:''} ${login?'Entrar':'Criar conta'}</button>
    </div>
    <p class="muted" style="margin-top:16px;text-align:center">
      ${login?'Ainda não tem conta? ':'Já tem conta? '}
      <button class="link" id="a-toggle">${login?'Criar agora':'Entrar'}</button>
    </p>
  </div></div>`;
  const go=()=>{const m=$('#a-mail').value.trim(),p=$('#a-pass').value;state.authEmail=m;if(!m||!p)return toast("Preencha e-mail e senha",true);login?entrar(m,p):criarConta(m,p,($('#a-nome')?.value||'').trim())};
  $('#a-mail').oninput=e=>state.authEmail=e.target.value;
  $('#a-go').onclick=go;
  $('#a-pass').onkeydown=e=>{if(e.key==='Enter')go()};
  $('#a-toggle').onclick=()=>{state.authEmail=$('#a-mail').value;state.authMode=login?'signup':'login';render()};
}

function viewPlanejar(){
  const p=state.pacientes.find(x=>x.id===state.pid);
  const sug=sugestoes(p), alvo=targetAreas(p), uso=usoPorJogo(state.pid);
  const primeiro=(state.user?.user_metadata?.nome||'').split(' ')[0];
  const hero=`
  <div class="hero">
    <div>
      <div class="hero-title display">Olá, ${esc(primeiro||'tudo bem?')}</div>
      <div class="hero-sub">Pronta para transformar o dia de mais um pequeno paciente?</div>
    </div>
    <div class="hero-stats">
      <span class="stat">${I.user}<b>${state.pacientes.length}</b> pacientes</span>
      <span class="stat">${I.brain}<b>${state.jogos.length}</b> jogos</span>
      <span class="stat">${I.clock}<b>${state.sessoes.filter(s=>s.data===hoje()).length}</b> hoje</span>

  <div class="qa-grid">
    <button class="qa teal" data-qa="novo-pac"><span class="qa-ic">${I.user}</span>Novo paciente</button>
    <button class="qa apricot" data-qa="novo-jogo"><span class="qa-ic">${I.plus}</span>Cadastrar jogo</button>

    <button class="qa plain" data-qa="banco"><span class="qa-ic">${I.brain}</span>Banco de jogos</button>
  </div>`;
  if(!state.pacientes.length){
    return hero+`<h2 class="h2 display">Planejar sessão</h2><div class="card empty" style="margin-top:8px">Cadastre um paciente primeiro — clique em <b>Novo paciente</b> acima.</div>`;

  return hero+`
  <h2 class="h2 display">Planejar sessão</h2>
  <p class="lead">Escolhe o paciente: a lista já cruza a demanda com o que cada jogo trabalha, e a <b style="color:var(--terra)">Sugestão inteligente</b> lê as descrições dos jogos e escolhe os que mais combinam. Monta a sessão à direita.</p>
  <div class="plan">
    <div>
      <label class="flabel">Paciente</label>
      <select id="sel-pac">${state.pacientes.map(x=>`<option value="${x.id}" ${x.id===state.pid?'selected':''}>${esc(x.iniciais)} · ${x.idade} anos · ${esc(x.demandas.join(', '))}</option>`).join('')}</select>
      ${p?`
        <div class="card pat" style="margin-top:14px">
          <div class="avatar">${iniciaisDe(p.iniciais)}</div>
          <div><div style="font-weight:600">${p.idade} anos</div>
            <div class="tags">${p.demandas.map(d=>`<span class="chip demanda">${esc(d)}</span>`).join('')}</div>
            ${p.obs?`<div class="why">${esc(p.obs)}</div>`:''}

          </div>
        </div>
        <button class="btn accent" id="btn-ia" style="margin-top:16px" ${state.ai.loading?'disabled':''}>
          ${state.ai.loading?I.spin:I.spark}${state.ai.loading?'Pensando na sessão…':'Sugestão inteligente'}
        </button>
        ${renderAI()}
        <div style="display:flex;align-items:baseline;justify-content:space-between;margin:22px 0 12px">
          <h3 class="display" style="font-size:18px;font-weight:600;color:var(--ink)">Jogos sugeridos</h3>
          <span class="muted">${sug.length} combinam com a demanda</span>
        </div>
        <div class="glist">${
          sug.length? sug.map((g,i)=>{
            const inS=state.sessao.includes(g.id);
            return `<div class="card gcard rise">
              <div class="rank">${i+1}</div>
              <div style="flex:1">
                <div style="display:flex;align-items:center;justify-content:space-between;gap:10px">

        <div><label class="flabel">Nota rápida</label><input class="input" id="in-nota" placeholder="anotação de planejamento" value="${esc(state.nota)}"></div>

function renderAI(){
  const {loading,result,error}=state.ai;
  if(loading||!(result||error))return'';
  if(error)return `<div class="ai" style="border-color:var(--terra-deep)"><span class="muted">${esc(error)}</span></div>`;
  const uso=usoPorNome(state.pid);
  return `<div class="ai rise"><h4>${I.spark} Sugestão da IA</h4>
    ${result.objetivo?`<p style="font-size:13.5px;margin-bottom:8px"><b>Objetivo:</b> ${esc(result.objetivo)}</p>`:''}
    <div style="display:flex;flex-direction:column;gap:8px">
      ${(result.jogos||[]).map(j=>{const u=uso.get(j.nome);return `<div style="display:flex;gap:10px;align-items:flex-start">
        <button class="btn sm" style="padding:5px 8px" data-add-name="${esc(j.nome)}" title="Adicionar à sessão">${I.plus}</button>
        <div><b style="font-size:13.5px">${esc(j.nome)}</b><div class="why">${esc(j.motivo||'')}</div>
        ${u?`<div class="alert-uso">${I.clock} Já usado com este paciente ${u.count>1?`(${u.count}x)`:''} · última vez ${fmtData(u.ultima)}</div>`:''}</div></div>`}).join('')}
    </div>
    ${result.observacao?`<p class="muted" style="margin-top:10px">${esc(result.observacao)}</p>`:''}</div>`;
}
function viewSessoes(){ return `<div id="sessoes-view">${viewSessoesBody()}</div>`; }
function viewSessoesBody(){
  const filtro=state.filtroPac||'todos';
  let lista=[...state.sessoes].sort((a,b)=>b.ts-a.ts);
  if(filtro!=='todos')lista=lista.filter(s=>s.pid===filtro);
  const nome=id=>{const p=state.pacientes.find(x=>x.id===id);return p?p.iniciais:'—'};
  // agrupa por dia (data da sessão), mais recente primeiro; dentro do dia, mais recente primeiro
  const grupos=new Map();
  lista.forEach(s=>{ const k=s.data||'—'; if(!grupos.has(k))grupos.set(k,[]); grupos.get(k).push(s); });
  const dias=[...grupos.keys()].sort((a,b)=>b.localeCompare(a));
  const idsVisiveis=new Set(lista.map(s=>s.id));
  [...state.selDia].forEach(id=>{if(!idsVisiveis.has(id))state.selDia.delete(id)}); // limpa seleção de itens que saíram do filtro
  const nSel=state.selDia.size;
  return `
  <div style="display:flex;align-items:center;margin-bottom:22px;gap:16px;flex-wrap:wrap">
    <div><h2 class="h2 display">Histórico de sessões</h2><p class="muted">Linha do tempo por dia — o que já foi usado com cada paciente.</p></div>
    <select id="sel-filtro" style="width:auto;margin-left:auto;min-width:200px">
      <option value="todos" ${filtro==='todos'?'selected':''}>Todos os pacientes</option>
      ${state.pacientes.map(p=>`<option value="${p.id}" ${filtro===p.id?'selected':''}>${esc(p.iniciais)}</option>`).join('')}
    </select>
    <button class="btn" id="btn-pdf-dia" ${nSel?'':'disabled'}>${I.pdf} Exportar PDF${nSel?` (${nSel})`:''}</button>
    <button class="btn primary" id="btn-print-dia" ${nSel?'':'disabled'}>${I.print} Imprimir selecionadas${nSel?` (${nSel})`:''}</button>
  </div>
  ${dias.length?dias.map(dia=>{
    const sess=grupos.get(dia);
    const todasSel=sess.every(s=>state.selDia.has(s.id));
    return `<div class="hist-dia" style="margin-bottom:26px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
          <input type="checkbox" class="chk-dia-all" data-dia="${esc(dia)}" ${todasSel?'checked':''} style="width:17px;height:17px;accent-color:var(--terra)">
          <b class="display" style="font-size:15px;color:var(--terra)">${fmtDiaLongo(dia)}</b>
        </label>
        <span class="muted" style="font-size:12.5px">· ${sess.length} sessão${sess.length>1?'ões':''}</span>
      </div>
      <div style="display:flex;flex-direction:column;gap:8px;padding-left:4px;border-left:2px solid var(--line)">
        ${sess.map(s=>{
          const preench=s.jogos.filter(j=>j.reacao&&j.reacao.trim()).length;
          return `<div class="card item-card" style="margin-left:14px;display:flex;align-items:flex-start;gap:12px;cursor:default">
            <input type="checkbox" class="chk-sess" data-id="${s.id}" ${state.selDia.has(s.id)?'checked':''} style="width:17px;height:17px;accent-color:var(--terra);margin-top:3px;flex-shrink:0">
            <div style="flex:1;cursor:pointer" data-open-sess="${s.id}">
              <div style="display:flex;align-items:center;gap:10px">
                <div class="avatar" style="width:36px;height:36px;font-size:13px">${iniciaisDe(nome(s.pid))}</div>
                <div><b style="font-size:14px">${esc(nome(s.pid))}</b><div class="muted">${s.jogos.length} jogo(s) · ${preench}/${s.jogos.length} c/ obs</div></div>
                ${s.reflexao&&Object.values(s.reflexao).some(v=>v)?`<span class="chip dim" title="Raciocínio clínico registrado" style="margin-left:auto">${I.brain}</span><span class="chip ${s.status==='realizada'?'hit':'demanda'}" style="margin-left:8px">${s.status==='realizada'?'Realizada':'Planejada'}</span>`:`<span class="chip ${s.status==='realizada'?'hit':'demanda'}" style="margin-left:auto">${s.status==='realizada'?'Realizada':'Planejada'}</span>`}
              </div>
              ${s.objetivo?`<div class="why">${esc(s.objetivo)}</div>`:''}
              <div class="tags">${s.jogos.map(j=>`<span class="chip dim" style="${j.trabalhado===false?'text-decoration:line-through;opacity:.6;':''}${j.extra?'border:1px dashed var(--secondary-deep);':''}">${esc(j.nome)}${j.extra?' <span style="opacity:.75">· extra</span>':''}</span>`).join('')}</div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join(''):`<div class="card empty">Nenhuma sessão registrada ainda. Monta uma no <b>Planejar</b> e clica em "Salvar sessão".</div>`}`;
}
function fmtDiaLongo(iso){
  if(iso==='—')return'Sem data';
  const hj=hoje(); const p=String(iso).split('-');
  const ontem=new Date(); ontem.setDate(ontem.getDate()-1);
  const ontemIso=ontem.getFullYear()+'-'+String(ontem.getMonth()+1).padStart(2,'0')+'-'+String(ontem.getDate()).padStart(2,'0');
  const DIAS=['domingo','segunda-feira','terça-feira','quarta-feira','quinta-feira','sexta-feira','sábado'];
  let rotulo=fmtData(iso);
  if(iso===hj)rotulo='Hoje';
  else if(iso===ontemIso)rotulo='Ontem';
  else if(p.length===3){const d=new Date(+p[0],+p[1]-1,+p[2]);rotulo=`${DIAS[d.getDay()]}, ${fmtData(iso)}`;rotulo=rotulo.charAt(0).toUpperCase()+rotulo.slice(1)}
  return rotulo;
}

/* ============================ EVOLUÇÃO DO PACIENTE ============================ */
function areasDaSessao(s){
  const set=new Set();
  (s.jogos||[]).filter(j=>j.trabalhado!==false).forEach(j=>{const g=state.jogos.find(x=>x.id===j.id);if(g)(g.areas||[]).forEach(a=>set.add(a))});
  return [...set];
}
function viewEvolucao(){
  if(!state.pacientes.length)return `<h2 class="h2 display">Evolução do paciente</h2><div class="card empty" style="margin-top:8px">Cadastre um paciente primeiro.</div>`;
  if(!state.evoPid||!state.pacientes.find(x=>x.id===state.evoPid))state.evoPid=state.pid||state.pacientes[0].id;
  const p=state.pacientes.find(x=>x.id===state.evoPid);
  const sess=sessoesDoPaciente(p.id);
  const realizadas=sess.filter(s=>s.status==='realizada');
  const primeira=sess.length?sess[sess.length-1].data:null;
  const ultima=sess.length?sess[0].data:null;
  const areasTrab=new Set(); sess.forEach(s=>areasDaSessao(s).forEach(a=>areasTrab.add(a)));
  // produtividade global (todos os pacientes) — conta sessões até hoje, sem inflar com planejadas futuras
  const _h=hoje(), _ano=_h.slice(0,4), _mes=_h.slice(0,7);
  const MESES=['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
  const nomeMes=MESES[+_mes.slice(5,7)-1];
  const sDia=state.sessoes.filter(s=>s.data===_h).length;
  const sMes=state.sessoes.filter(s=>s.data&&s.data.startsWith(_mes)&&s.data<=_h).length;
  const sAno=state.sessoes.filter(s=>s.data&&s.data.startsWith(_ano)&&s.data<=_h).length;
  return `
  <div style="display:flex;align-items:center;margin-bottom:18px;gap:16px;flex-wrap:wrap">
    <div><h2 class="h2 display">Evolução do paciente</h2><p class="muted">Histórico clínico completo, pronto pra exportar e entregar aos responsáveis.</p></div>
    <select id="sel-evo" style="width:auto;margin-left:auto;min-width:220px">
      ${state.pacientes.map(x=>`<option value="${x.id}" ${x.id===state.evoPid?'selected':''}>${esc(x.iniciais)}</option>`).join('')}
    </select>
    <button class="btn primary" id="btn-relatorio" ${sess.length?'':'disabled'}>${I.doc} Exportar relatório (PDF)</button>
  </div>
  <h3 class="display" style="font-size:17px;font-weight:700;margin-bottom:14px">Suas sessões <span class="muted" style="font-weight:400;font-size:13px">· todos os pacientes</span></h3>
  <div class="evo-stats" style="margin-bottom:26px">
    <div class="evo-stat"><div class="num">${sDia}</div><div class="lbl">Hoje</div></div>
    <div class="evo-stat"><div class="num">${sMes}</div><div class="lbl">Em ${nomeMes}</div></div>
    <div class="evo-stat"><div class="num">${sAno}</div><div class="lbl">Em ${_ano}</div></div>
  </div>
  <div class="card pat">
    <div class="avatar">${iniciaisDe(p.iniciais)}</div>
    <div><b style="font-size:15px">${esc(p.iniciais)}</b><div class="muted">${p.idade} anos</div>
      <div class="tags">${p.demandas.map(d=>`<span class="chip demanda">${esc(d)}</span>`).join('')}</div></div>
  </div>
  <div class="evo-stats">
    <div class="evo-stat"><div class="num">${sess.length}</div><div class="lbl">Sessões no total</div></div>
    <div class="evo-stat"><div class="num">${realizadas.length}</div><div class="lbl">Realizadas</div></div>
    <div class="evo-stat"><div class="num">${areasTrab.size}</div><div class="lbl">Objetivos trabalhados</div></div>
    <div class="evo-stat"><div class="num" style="font-size:17px;padding-top:6px">${primeira?fmtData(primeira):'—'}</div><div class="lbl">Primeira sessão</div></div>
    <div class="evo-stat"><div class="num" style="font-size:17px;padding-top:6px">${ultima?fmtData(ultima):'—'}</div><div class="lbl">Última sessão</div></div>
  </div>
  <h3 class="display" style="font-size:17px;font-weight:700;margin-bottom:14px">Linha do tempo</h3>
  ${sess.length?`<div class="tl">${sess.map(s=>{
    const areas=areasDaSessao(s);
    const reacoes=(s.jogos||[]).filter(j=>j.reacao&&j.reacao.trim()).map(j=>j.reacao.trim());
    return `<div class="tl-item ${s.status}">
      <div class="card" style="padding:14px 16px;cursor:pointer" data-open-sess="${s.id}">
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
          <b style="font-size:14px">${fmtData(s.data)}</b>
          <span class="chip ${s.status==='realizada'?'hit':'demanda'}">${s.status==='realizada'?'Realizada':'Planejada'}</span>
          ${s.objetivo?`<span class="muted">· ${esc(s.objetivo)}</span>`:''}
        </div>
        ${areas.length?`<div class="tags" style="margin-top:9px">${areas.map(a=>`<span class="chip dim">${esc(a)}</span>`).join('')}</div>`:''}
        ${reacoes.length?`<div class="why" style="margin-top:8px">${reacoes.map(r=>esc(r)).join(' · ')}</div>`:''}
        ${s.nota?`<div class="why" style="margin-top:4px"><b>Nota:</b> ${esc(s.nota)}</div>`:''}
      </div></div>`;
  }).join('')}</div>`
  :`<div class="card empty">Nenhuma sessão registrada pra este paciente ainda.</div>`}`;
}
function abrirRelatorio(){
  const p=state.pacientes.find(x=>x.id===state.evoPid); if(!p)return;
  const sess=[...sessoesDoPaciente(p.id)].reverse(); // cronológica no relatório
  const realizadas=sess.filter(s=>s.status==='realizada');
  const nomeProf=state.user?.user_metadata?.nome||'';
  const emissao=new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'long',year:'numeric'});
  openModal(`
    <div class="modal-head"><b class="display" style="font-size:19px;color:var(--terra)">Relatório de evolução</b><button class="btn ghost" id="mx" style="margin-left:auto;padding:6px">${I.x}</button></div>
    <div class="modal-body rep">
      <div class="rep-head">
        ${LOGO_SVG}
        <div class="rep-title">Relatório de<br>Evolução Terapêutica</div>
      </div>
      <div class="rep-meta">
        <div><b>Paciente:</b> ${esc(p.iniciais)}</div>
        <div><b>Idade:</b> ${p.idade} anos</div>
        <div><b>Demanda(s):</b> ${esc(p.demandas.join(', ')||'—')}</div>
        <div><b>Profissional:</b> ${esc(nomeProf)}</div>
        <div><b>Período:</b> ${sess.length?fmtData(sess[0].data)+' a '+fmtData(sess[sess.length-1].data):'—'}</div>
        <div><b>Sessões realizadas:</b> ${realizadas.length} de ${sess.length}</div>
      </div>
      ${sess.map((s,i)=>{
        const areas=areasDaSessao(s);
        const reacoes=(s.jogos||[]).filter(j=>j.reacao&&j.reacao.trim()).map(j=>j.reacao.trim());
        return `<div class="rep-sess ${s.status}">
          <h6>Sessão ${i+1} — ${fmtData(s.data)}${s.status!=='realizada'?' (planejada)':''}</h6>
          ${s.objetivo?`<div class="rep-sec">Objetivo da sessão</div><div>${esc(s.objetivo)}</div>`:''}
          ${areas.length?`<div class="rep-sec">Objetivos terapêuticos trabalhados</div><div>${areas.map(a=>esc(a)).join(' · ')}</div>`:''}
          ${reacoes.length?`<div class="rep-sec">Evolução observada</div><div>${reacoes.map(r=>esc(r)).join('<br>')}</div>`:''}
          ${s.nota?`<div class="rep-sec">Observações</div><div>${esc(s.nota)}</div>`:''}
        </div>`;
      }).join('')}
      <div class="rep-foot"><span>${esc(BRAND.nome)} · ${esc(BRAND.clinica)}</span><span>Emitido em ${emissao}</span></div>
    </div>
    <div class="modal-foot"><button class="btn" id="mcancel">Fechar</button><button class="btn primary" id="rep-print">${I.print} Salvar como PDF</button></div>`);
  $('#mx').onclick=closeModal;$('#mcancel').onclick=closeModal;
  $('#rep-print').onclick=()=>window.print();
}

    <div class="card" style="padding:20px;max-width:620px">
      <b style="font-size:14.5px">Ativação necessária (uma vez, pelo administrador)</b>
      <p class="muted" style="margin-top:8px">A integração usa o login Google da própria profissional — os eventos não passam por nenhum servidor nosso. Pra ativar: crie um <b>OAuth Client ID</b> no Google Cloud Console (com a Calendar API ativa e o endereço do sistema nas origens autorizadas) e cole no campo <code>GOOGLE_CLIENT_ID</code> no topo do código. As instruções passo a passo estão comentadas lá.</p>
    </div>`;
  }
  const g=state.gcal;
  if(!g.connected){
    return `<h2 class="h2 display">Agenda</h2>
    <p class="lead">Conecte sua conta Google pra ver e criar eventos direto daqui.</p>
    <div class="card" style="padding:24px;max-width:480px;text-align:center">
      ${g.erro?`<p class="muted" style="color:var(--secondary-deep);margin-bottom:12px">${esc(g.erro)}</p>`:''}
      <button class="btn primary" id="btn-gcal-connect" ${g.loading?'disabled':''}>${g.loading?I.spin:I.agenda} Conectar Google Agenda</button>
      <p class="muted" style="margin-top:12px">Seus eventos ficam só entre o seu navegador e o Google.</p>
    </div>`;
  }
  // agrupa eventos por dia
  const porDia={};
  g.events.forEach(ev=>{
    const ini=ev.start?.dateTime||ev.start?.date; if(!ini)return;
    const dia=ini.slice(0,10);
    (porDia[dia]=porDia[dia]||[]).push(ev);
  });
  const dias=Object.keys(porDia).sort();
  const fmtDia=d=>new Date(d+'T12:00:00').toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'});
  const fmtHora=ev=>{
    if(ev.start?.date)return 'Dia todo';
    const h=x=>new Date(x).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    return h(ev.start.dateTime)+'–'+h(ev.end?.dateTime||ev.start.dateTime);
  };
  return `
  <div style="display:flex;align-items:center;margin-bottom:18px;gap:12px;flex-wrap:wrap">
    <div><h2 class="h2 display">Agenda</h2><p class="muted">Próximos 14 dias da sua Google Agenda.</p></div>
    <button class="btn" id="btn-gcal-refresh" style="margin-left:auto" ${g.loading?'disabled':''}>${g.loading?I.spin:I.clock} Atualizar</button>
    <button class="btn primary" id="btn-gcal-novo">${I.plus} Novo evento</button>
    <button class="btn ghost" id="btn-gcal-out" title="Desconectar">${I.out}</button>
  </div>
  ${dias.length?dias.map(d=>`
    <div class="ag-day">
      <div class="ag-day-h">${fmtDia(d)}</div>
      ${porDia[d].map(ev=>`<div class="card ag-ev">
        <span class="ag-hora">${fmtHora(ev)}</span>
        <span style="font-weight:600;font-size:14px;flex:1">${esc(ev.summary||'(sem título)')}</span>
        ${ev.htmlLink?`<a class="btn ghost" style="padding:6px 10px;text-decoration:none" href="${esc(ev.htmlLink)}" target="_blank" rel="noopener">abrir ↗</a>`:''}
      </div>`).join('')}
    </div>`).join('')
  :`<div class="card empty">Nenhum evento nos próximos 14 dias.</div>`}`;
}
function gcalConnect(){
  if(typeof google==='undefined'||!google.accounts){state.gcal.erro="Biblioteca do Google não carregou (sem internet?).";render();return}
  state.gcal.loading=true;state.gcal.erro=null;render();
  if(!gcalTokenClient){
    gcalTokenClient=google.accounts.oauth2.initTokenClient({
      client_id:GOOGLE_CLIENT_ID,
      scope:'https://www.googleapis.com/auth/calendar.events',
      callback:async(resp)=>{
        if(resp.error){state.gcal.loading=false;state.gcal.erro="Conexão cancelada ou negada.";render();return}
        state.gcal.token=resp.access_token;state.gcal.connected=true;
        await gcalCarregar();
      }
    });
  }
  gcalTokenClient.requestAccessToken({prompt:state.gcal.token?'':'consent'});
}
async function gcalCarregar(){
  state.gcal.loading=true;render();
  try{
    const agora=new Date();const fim=new Date(Date.now()+14*86400000);
    const url=`https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${agora.toISOString()}&timeMax=${fim.toISOString()}&singleEvents=true&orderBy=startTime&maxResults=100`;
    const r=await fetch(url,{headers:{Authorization:'Bearer '+state.gcal.token}});
    if(r.status===401){state.gcal.connected=false;state.gcal.token=null;state.gcal.loading=false;state.gcal.erro="Sessão do Google expirou — conecte de novo.";render();return}
    if(!r.ok)throw new Error("HTTP "+r.status);
    const data=await r.json();
    state.gcal.events=data.items||[];
    state.gcal.loading=false;render();
  }catch(e){state.gcal.loading=false;state.gcal.erro="Erro ao carregar: "+e.message;state.gcal.connected=false;render()}
}
function gcalNovoEvento(){
  const tz=Intl.DateTimeFormat().resolvedOptions().timeZone;
  openModal(`
    <div class="modal-head"><b class="display" style="font-size:19px;color:var(--terra)">Novo evento</b><button class="btn ghost" id="mx" style="margin-left:auto;padding:6px">${I.x}</button></div>
    <div class="modal-body">
      <div><label class="flabel">Título</label><input class="input" id="g-tit" placeholder="ex: Sessão — Arthur"></div>
      <div class="row">
        <div class="grow"><label class="flabel">Data</label><input class="input" id="g-data" type="date" value="${hoje()}"></div>
        <div class="grow"><label class="flabel">Início</label><input class="input" id="g-hora" type="time" value="14:00"></div>
        <div class="grow"><label class="flabel">Duração</label><select id="g-dur"><option value="30">30 min</option><option value="45">45 min</option><option value="50" selected>50 min</option><option value="60">1 hora</option></select></div>
      </div>
      <div><label class="flabel">Descrição (opcional)</label><input class="input" id="g-desc" placeholder="observações"></div>
    </div>
    <div class="modal-foot"><button class="btn" id="mcancel">Cancelar</button><button class="btn primary" id="g-save">${I.plus} Criar na Google Agenda</button></div>`);
  $('#mx').onclick=closeModal;$('#mcancel').onclick=closeModal;
  $('#g-save').onclick=async()=>{
    const tit=$('#g-tit').value.trim();if(!tit)return $('#g-tit').focus();
    const d=$('#g-data').value,h=$('#g-hora').value,dur=+$('#g-dur').value;
    const ini=new Date(`${d}T${h}:00`);const fim=new Date(ini.getTime()+dur*60000);
    const pad=n=>String(n).padStart(2,'0');
    const iso=x=>`${x.getFullYear()}-${pad(x.getMonth()+1)}-${pad(x.getDate())}T${pad(x.getHours())}:${pad(x.getMinutes())}:00`;
    try{
      const r=await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events',{
        method:'POST',headers:{Authorization:'Bearer '+state.gcal.token,'content-type':'application/json'},
        body:JSON.stringify({summary:tit,description:$('#g-desc').value.trim(),start:{dateTime:iso(ini),timeZone:tz},end:{dateTime:iso(fim),timeZone:tz}})
      });
      if(!r.ok)throw new Error("HTTP "+r.status);
      toast("Evento criado na Google Agenda.");closeModal();gcalCarregar();
    }catch(e){toast("Erro ao criar: "+e.message,true)}
  };
}

function modalPaciente(p){

  const mapaLocal={}; // nome -> Set(areas) só das demandas personalizadas
  f.demandas.forEach(n=>{ if(!ehDemandaBase(n)) mapaLocal[n]=new Set(mapaBase.get(n)||[]); });
  const extras=f.demandas.filter(d=>!efetivas.some(x=>x.nome===d));
  openModal(`
    <div class="modal-head"><b class="display" style="font-size:19px;color:var(--terra)">${editing?'Editar':'Novo'} paciente</b><button class="btn ghost" id="mx" style="margin-left:auto;padding:6px">${I.x}</button></div>

        <div class="row" style="margin-top:9px"><input class="input" id="f-dem-novo" placeholder="Outra demanda… (ex: Seletividade alimentar)" style="flex:1"><button type="button" class="btn sm" id="f-dem-add">${I.plus} Adicionar</button></div>
        <div id="f-dem-areas" style="margin-top:12px"></div>
      </div>
      <div><label class="flabel">Observações</label><input class="input" id="f-obs" value="${esc(f.obs)}" placeholder="opcional"></div>
    </div>
    <div class="modal-foot"><button class="btn" id="mcancel">Cancelar</button><button class="btn primary" id="msave">Salvar</button></div>`);
  $('#mx').onclick=closeModal; $('#mcancel').onclick=closeModal;
  const toggleGroup=$('#f-dem');
  function renderDemAreas(){
    const box=$('#f-dem-areas');

    if(!custom.length){box.innerHTML='';return}
    box.innerHTML=`<div class="plano-jogo" style="padding:12px">
      <div class="muted" style="margin-bottom:10px">Essas demandas foram criadas por você. Marque as funções cognitivas que cada uma trabalha — é isso que faz elas <b>casarem com os jogos</b> do banco:</div>
      ${custom.map(n=>{
        if(!mapaLocal[n])mapaLocal[n]=new Set(mapaBase.get(n)||[]);
        return `<div style="margin-bottom:12px"><b style="font-size:13px">${esc(n)}</b>
          <div class="toggles" data-dem-area="${esc(n)}" style="margin-top:6px">${AREAS.map(a=>`<button type="button" class="toggle ${mapaLocal[n].has(a)?'on':''}" data-a="${esc(a)}">${esc(a)}</button>`).join('')}</div></div>`;
      }).join('')}</div>`;
    box.querySelectorAll('[data-dem-area]').forEach(grp=>{
      const nome=grp.dataset.demArea;
      grp.querySelectorAll('.toggle').forEach(b=>b.onclick=()=>{
        const a=b.dataset.a;
        if(mapaLocal[nome].has(a)){mapaLocal[nome].delete(a);b.classList.remove('on')}
        else{mapaLocal[nome].add(a);b.classList.add('on')}

function exportarSessoesPDF(){
  const ids=[...state.selDia];
  if(!ids.length)return;
  if(!window.jspdf||!window.jspdf.jsPDF){alert('Não foi possível carregar o gerador de PDF. Verifique sua conexão e tente novamente.');return}
  const sess=state.sessoes.filter(s=>ids.includes(s.id)).sort((a,b)=>{
    if(a.data!==b.data)return (a.data||'').localeCompare(b.data||'');
    const na=state.pacientes.find(p=>p.id===a.pid)?.iniciais||'';
    const nb=state.pacientes.find(p=>p.id===b.pid)?.iniciais||'';
    return na.localeCompare(nb);
  });
  const porDia=new Map(); sess.forEach(s=>{const k=s.data||'—'; if(!porDia.has(k))porDia.set(k,[]); porDia.get(k).push(s)});

  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({unit:'pt',format:'a4'});
  const W=595.28,H=841.89,M=44,CW=W-M*2;
  const COL_PRI=[60,133,140],COL_PRI_L=[77,161,169],COL_TINT=[225,239,240],COL_INK=[36,53,54],
        COL_SOFT=[110,128,128],COL_LINE=[225,232,232],COL_GOLD=[244,162,97],COL_CREAM=[243,247,247];
  let y=0,page=1;

  function drawHeader(first){
    const bandH=first?92:50;
    doc.setFillColor(...COL_PRI);
    doc.rect(0,0,W,bandH,'F');
    doc.setFillColor(...COL_GOLD);
    doc.rect(0,bandH-4,W,4,'F');
    if(first){
      doc.setTextColor(255,255,255);
      doc.setFont('helvetica','bold'); doc.setFontSize(21);
      doc.text('Lúdica',M,40);
      doc.setFont('helvetica','normal'); doc.setFontSize(10.5);
      doc.text('Histórico de sessões · planejamento com jogos',M,58);
      const hoje=new Date();
      const dataStr=String(hoje.getDate()).padStart(2,'0')+'/'+String(hoje.getMonth()+1).padStart(2,'0')+'/'+hoje.getFullYear();
      doc.setFontSize(9.5);
      doc.text(`Gerado em ${dataStr}`,W-M,40,{align:'right'});
      doc.text(`${sess.length} sessão${sess.length>1?'ões':''} selecionada${sess.length>1?'s':''}`,W-M,54,{align:'right'});
      y=bandH+34;
    } else {
      doc.setTextColor(255,255,255);
      doc.setFont('helvetica','bold'); doc.setFontSize(12);
      doc.text('Lúdica · Histórico de sessões',M,31);
      y=bandH+26;
    }
  }
  function ensureSpace(h){
    if(y+h>H-56){
      doc.addPage(); page++;
      drawHeader(false);
    }
  }
  function chipStatus(status,x,cy){
    const label=status==='realizada'?'Realizada':'Planejada';
    const color=status==='realizada'?COL_PRI:COL_GOLD;
    doc.setFont('helvetica','bold'); doc.setFontSize(8.3);
    const w=doc.getTextWidth(label)+16;
    doc.setFillColor(...color);
    doc.roundedRect(x-w,cy-11,w,16,8,8,'F');
    doc.setTextColor(255,255,255);
    doc.text(label,x-w/2,cy,{align:'center'});
    return w;
  }

  drawHeader(true);

  [...porDia.keys()].forEach(dia=>{
    ensureSpace(36);
    doc.setFont('helvetica','bold'); doc.setFontSize(13);
    doc.setTextColor(...COL_PRI);
    doc.text(fmtDiaLongo(dia),M,y);
    y+=8;
    doc.setDrawColor(...COL_LINE); doc.setLineWidth(1);
    doc.line(M,y,W-M,y);
    y+=20;

    porDia.get(dia).forEach(s=>{
      const p=state.pacientes.find(x=>x.id===s.pid);
      const nomeP=p?p.iniciais:'—';
      const idadeP=p?`${p.idade} anos`:'';
      const jogosStr=s.jogos.map(j=>j.nome+(j.extra?' (extra)':'')+(j.trabalhado===false?' (não trabalhado)':'')).join(', ')||'—';

      doc.setFont('helvetica','normal'); doc.setFontSize(9.8);
      const objLines=s.objetivo?doc.splitTextToSize(s.objetivo,CW-28):[];
      const jogosLines=doc.splitTextToSize(jogosStr,CW-28);
      const notaLines=s.nota?doc.splitTextToSize(s.nota,CW-28):[];

      let inner=46;
      if(objLines.length)inner+=12+objLines.length*12.5+8;
      inner+=12+jogosLines.length*12.5;
      if(notaLines.length)inner+=10+notaLines.length*11;
      const cardH=inner+16;

      ensureSpace(cardH+16);
      const cy0=y;
      doc.setFillColor(255,255,255);
      doc.setDrawColor(...COL_LINE); doc.setLineWidth(1);
      doc.roundedRect(M,cy0,CW,cardH,7,7,'FD');

      doc.setFillColor(...COL_TINT);
      doc.circle(M+24,cy0+22,13,'F');
      doc.setFont('helvetica','bold'); doc.setFontSize(9);
      doc.setTextColor(...COL_PRI);
      doc.text(iniciaisDe(nomeP),M+24,cy0+25,{align:'center'});

      doc.setFont('helvetica','bold'); doc.setFontSize(11.5);
      doc.setTextColor(...COL_INK);
      doc.text(nomeP,M+46,cy0+19);
      if(idadeP){doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(...COL_SOFT); doc.text(idadeP,M+46,cy0+31)}

      chipStatus(s.status,M+CW-14,cy0+20);

      let ty=cy0+46;
      if(objLines.length){
        doc.setFont('helvetica','bold'); doc.setFontSize(8.6); doc.setTextColor(...COL_PRI_L);
        doc.text('OBJETIVO',M+14,ty); ty+=12;
        doc.setFont('helvetica','normal'); doc.setFontSize(9.8); doc.setTextColor(...COL_INK);
        doc.text(objLines,M+14,ty); ty+=objLines.length*12.5+8;
      }
      doc.setFont('helvetica','bold'); doc.setFontSize(8.6); doc.setTextColor(...COL_PRI_L);
      doc.text('JOGOS',M+14,ty); ty+=12;
      doc.setFont('helvetica','normal'); doc.setFontSize(9.8); doc.setTextColor(...COL_INK);
      doc.text(jogosLines,M+14,ty); ty+=jogosLines.length*12.5;
      if(notaLines.length){
        ty+=10;
        doc.setFont('helvetica','italic'); doc.setFontSize(9); doc.setTextColor(...COL_SOFT);
        doc.text(notaLines,M+14,ty);
      }
      y=cy0+cardH+16;
    });
    y+=6;
  });

  const totalPages=doc.internal.getNumberOfPages();
  for(let i=1;i<=totalPages;i++){
    doc.setPage(i);
    doc.setDrawColor(...COL_LINE); doc.setLineWidth(0.7);
    doc.line(M,H-40,W-M,H-40);
    doc.setFont('helvetica','normal'); doc.setFontSize(8.3);
    doc.setTextColor(...COL_SOFT);
    doc.text('Lúdica — planejamento de sessões terapêuticas com jogos',M,H-26);
    doc.text(`${i} / ${totalPages}`,W-M,H-26,{align:'right'});
  }

  const hj=hoje();
  doc.save(`ludica-historico-${hj}.pdf`);
}

    const jogos=jogosLocal.map(j=>({id:j.id,nome:j.nome,reacao:(j.reacao||'').trim(),trabalhado:j.trabalhado,extra:!!j.extra}));
    const rf={observacao:$('#rc-obs').value.trim(),hipotese:$('#rc-hip').value.trim(),ajuste:$('#rc-aj').value.trim(),proximo:$('#rc-prox').value.trim()};
    const reflexao=Object.values(rf).some(v=>v)?rf:null;
    const patch={data:$('#s-data').value||s.data,objetivo:$('#s-obj').value.trim(),nota:$('#s-nota').value.trim(),status:$('#s-real').checked?'realizada':'planejada',jogos,reflexao};
    const {data,error}=await safeWrite(pl=>sb.from('sessoes').update(pl).eq('id',id).select().single(),patch,['reflexao']);
    if(error)return toast(error.message,true);
    state.sessoes=state.sessoes.map(x=>x.id===id?sessFromRow(data):x);
    closeModal();render();
  };
}

/* ============================ IA (via Edge Function — chave fica no servidor) ============================ */
const IA_FN_URL = SUPABASE_URL + "/functions/v1/gemini";
async function chamarGemini(prompt,model,maxTokens){
  const token=(await sb.auth.getSession()).data.session?.access_token;
  if(!token)throw new Error("faça login novamente");
  const r=await fetch(IA_FN_URL,{
    method:"POST",
    headers:{"content-type":"application/json","apikey":SUPABASE_ANON_KEY,"Authorization":"Bearer "+token},
    body:JSON.stringify({prompt,model,maxTokens})
  });
  const data=await r.json().catch(()=>({}));
  if(!r.ok)throw new Error(data.error||("HTTP "+r.status));
  const text=data.text||"";
  if(!text.trim())throw new Error("resposta vazia da IA");
  return JSON.parse(text.replace(/```json|```/g,"").trim());
}
async function pedirIA(){
  const p=state.pacientes.find(x=>x.id===state.pid); if(!p)return;
  const model=modeloAtual();
  state.ai={loading:true,result:null,error:null};render();
  try{
    const usoMap=usoPorNome(p.id);
    const catalogo=state.jogos.map(g=>{const u=usoMap.get(g.nome);return {nome:g.nome,descricao:g.obs||"",faixa:g.max?`${g.min}-${g.max}`:`${g.min}+`,ja_usado_com_este_paciente:u?`${u.count}x, última vez ${u.ultima}`:"nunca"}});
    const prompt=`Você é uma assistente clínica que ajuda psicólogas infantis a planejar sessões com jogos terapêuticos.

Paciente:
- Idade: ${p.idade} anos
- Demanda(s): ${p.demandas.join(", ")}
- Observações: ${p.obs||"—"}

Catálogo (JSON) — cada item tem "descricao" com os objetivos que trabalha:
${JSON.stringify(catalogo)}

Leia as DESCRIÇÕES e escolha de 2 a 4 itens DESTE catálogo cujos objetivos melhor atendam à(s) demanda(s) e à idade do paciente. Use exatamente os nomes. Cada item tem "ja_usado_com_este_paciente" — prefira variar em relação ao que já foi muito repetido, mas pode reusar se for claramente o mais indicado. Para cada um, explique em 1 frase curta o porquê, conectando com a demanda. Sugira também um objetivo curto pra sessão.

Responda SOMENTE com JSON válido, neste formato:
{"objetivo":"...","jogos":[{"nome":"...","motivo":"..."}],"observacao":"..."}`;
    const parsed=await chamarGemini(prompt,model,2048);
    state.ai={loading:false,result:parsed,error:null};render();
  }catch(e){ state.ai={loading:false,result:null,error:"Não consegui gerar agora: "+e.message};render(); }
}

/* ============================ IMPORTAR PLANILHA (IA) ============================ */
function abrirImport(){
  if(typeof XLSX==="undefined")return toast("Leitor de planilha não carregou (sem internet?).",true);
  const inp=document.createElement('input');inp.type='file';inp.accept='.xlsx,.xls,.csv';
  inp.onchange=()=>{const f=inp.files[0];if(f)processarArquivo(f)};
  inp.click();
}
async function processarArquivo(file){
  openModal(`<div class="modal-body" style="align-items:center;text-align:center;padding:42px 20px"><div style="color:var(--terra)">${I.spin}</div><p class="muted" style="margin-top:12px">Lendo a planilha e organizando com a IA…</p></div>`);
  try{
    const buf=await file.arrayBuffer();
    const wb=XLSX.read(buf,{type:'array'});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const rows=XLSX.utils.sheet_to_json(ws,{defval:''});
    if(!rows.length){closeModal();return toast("A planilha parece vazia.",true)}
    const model=modeloAtual();
    const prompt=`Você recebe linhas de uma planilha de jogos terapêuticos (JSON) e converte para o formato do sistema.

Áreas válidas (use SOMENTE estas, mapeando o texto da planilha para as mais próximas):
${AREAS.join(", ")}

Regras:
- "nome": nome do jogo.
- "areas": lista só com áreas válidas acima que o jogo trabalha (infira pelas colunas).
- "idade_min": número (se não houver, use 4).
- "idade_max": número ou null.
- "obs": observação curta ou "".
- Ignore linhas vazias ou que não sejam jogos.

Linhas (JSON):
${JSON.stringify(rows).slice(0,12000)}

Responda SOMENTE com um array JSON:
[{"nome":"...","areas":["..."],"idade_min":6,"idade_max":null,"obs":"..."}]`;
    let arr=await chamarGemini(prompt,model,8192);
    if(!Array.isArray(arr))throw new Error("resposta inesperada da IA");
    arr=arr.map(g=>({nome:String(g.nome||"").trim(),areas:(g.areas||[]).filter(a=>AREAS.includes(a)),min:Number(g.idade_min)||4,max:g.idade_max?Number(g.idade_max):null,obs:String(g.obs||"").trim()})).filter(g=>g.nome);
    if(!arr.length){closeModal();return toast("A IA não encontrou jogos na planilha.",true)}
    previewImport(arr);
  }catch(e){closeModal();toast("Erro ao importar: "+e.message,true)}
}
function previewImport(games){
  const sel=new Set(games.map((_,i)=>i));
  openModal(`
    <div class="modal-head"><b class="display" style="font-size:19px;color:var(--terra)">Revisar importação</b><button class="btn ghost" id="mx" style="margin-left:auto;padding:6px">${I.x}</button></div>
    <div class="modal-body">
      <p class="muted">A IA organizou ${games.length} jogo(s). Desmarque os que não quiser — depois dá pra editar cada um normalmente.</p>
      <div style="display:flex;flex-direction:column;gap:10px">
        ${games.map((g,i)=>`<label class="plano-jogo" style="display:flex;gap:10px;cursor:pointer;align-items:flex-start">
          <input type="checkbox" data-i="${i}" checked style="margin-top:3px;width:17px;height:17px;accent-color:var(--terra)">
          <div style="flex:1"><b>${esc(g.nome)}</b> <span class="muted">· ${g.max?`${g.min}–${g.max}`:`${g.min}+`} anos</span>
            <div class="tags" style="margin-top:6px">${g.areas.map(a=>`<span class="chip">${esc(a)}</span>`).join('')||'<span class="muted">sem áreas identificadas</span>'}</div></div>
        </label>`).join('')}
      </div>
    </div>
    <div class="modal-foot"><button class="btn" id="mcancel">Cancelar</button><button class="btn primary" id="mconfirm">${I.plus} Adicionar ao banco</button></div>`);
  $('#mx').onclick=closeModal;$('#mcancel').onclick=closeModal;
  document.querySelectorAll('[data-i]').forEach(c=>c.onchange=()=>{const i=+c.dataset.i;c.checked?sel.add(i):sel.delete(i)});
  $('#mconfirm').onclick=()=>confirmarImport(games.filter((_,i)=>sel.has(i)));
}
async function confirmarImport(games){
  if(!games.length)return closeModal();
  const rows=games.map(g=>({user_id:state.user.id,nome:g.nome,areas:g.areas,idade_min:g.min,idade_max:g.max,obs:g.obs}));
  const {data,error}=await sb.from('jogos').insert(rows).select();
  if(error)return toast(error.message,true);
  state.jogos=[...state.jogos,...data.map(jogoFromRow)].sort((a,b)=>a.nome.localeCompare(b.nome));
  toast(`${data.length} jogo(s) adicionados.`);closeModal();render();
}

boot();
